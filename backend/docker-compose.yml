version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: routegen-db
    environment:
      POSTGRES_USER: routegen
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: routegen_db
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data:
